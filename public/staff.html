<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast & Foodious — Admin</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="stylesheet" href="staff.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- TOP ADMIN BAR -->
<nav class="admin-bar">
  <div class="admin-left">
    🍔 Fast & Foodious — Admin
  </div>
  <div class="admin-right">
    <span id="adminWelcome"></span>
    <button id="logoutBtn" class="btn btn-sm btn-outline-light ms-3">Logout</button>
  </div>
</nav>

<div class="container mt-4">

  <!-- SUMMARY CARDS -->
   <div class="card p-3 mb-4">
  <h5>🏪 Shop Control</h5>

  <div class="mt-2">
    <button id="toggleShopBtn" class="btn btn-success btn-sm" style="font-weight: 600; padding: 8px 16px;">
      🟢 Shop Open
    </button>
  </div>

  <div class="mt-3">
    <div class="row gap-2">
      <div class="col">
        <label for="openTimeInput" class="form-label small">Open Time</label>
        <input type="time" id="openTimeInput" class="form-control" value="09:20">
      </div>
      <div class="col">
        <label for="closeTimeInput" class="form-label small">Close Time</label>
        <input type="time" id="closeTimeInput" class="form-control" value="17:30">
      </div>
    </div>
    <button id="saveTimingsBtn" class="btn btn-info btn-sm mt-2">
      Save Timings
    </button>
  </div>

  <div id="shopStatusText" class="mt-2 text-muted"></div>
</div>
  <!-- <div class="row g-3 mb-4" id="summaryCards">
    <div class="col-md-4 col-6">
      <div class="summary-card bg-warning">
        <h5 id="activeCount">0</h5>
        <p>Active Orders</p>
      </div>
    </div>
    <div class="col-md-4 col-6">
      <div class="summary-card bg-success">
        <h5 id="readyCount">0</h5>
        <p>Ready Orders</p>
      </div>
    </div>
    <div class="col-md-4 col-6">
      <div class="summary-card bg-info">
        <h5 id="totalToday">0</h5>
        <p>Today's Total</p>
      </div>
    </div>
  </div> -->

  <!-- TAB NAVIGATION -->
  <div class="staff-tabs mb-4">
    <button class="tab-btn active" id="ordersTabBtn">⏳ Active Orders</button>
    <button class="tab-btn" id="menuTabBtn">📦 Menu Management</button>
  </div>

  <!-- ACTIVE ORDERS SECTION -->
  <section id="ordersSection">
    <h4 class="section-title">Active Orders</h4>
    <div id="activeOrders" class="orders-grid"></div>

    <!-- SERVED ORDERS -->
    <div class="mt-5">
      <div class="d-flex justify-content-between align-items-center">
        <h4 class="section-title">Served Orders</h4>
        <button id="clearHistory" class="btn btn-danger btn-sm">Clear History</button>
      </div>

      <div class="table-responsive mt-3">
        <table class="table table-hover table-bordered align-middle">
          <thead class="table-secondary">
            <tr>
              <th>Token</th>
              <th>Total</th>
              <th>Date & Time</th>
            </tr>
          </thead>
          <tbody id="servedOrders"></tbody>
        </table>
      </div>
    </div>
  </section>

  <!-- MENU MANAGEMENT SECTION -->
  <section id="menuSection" class="d-none">
    <h4 class="section-title">📦 Menu Stock Management</h4>
    <div id="menuItems" class="menu-grid"></div>
  </section>

</div>

<script type="module" src="./staff.js"></script>

<script type="module">
  import { auth } from "./firebase-config.js";
  import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

  const welcome = document.getElementById("adminWelcome");

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "signin.html";
      return;
    }

    const db = getDatabase();
    const snap = await get(ref(db, "users/" + user.uid));

    if (!snap.exists() || snap.val().role !== "owner") {
      window.location.href = "student.html";
    } else {
      welcome.textContent = `Hi, ${snap.val().name}`;
    }
  });

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "index.html";
  });
</script>
<script>
  function checkInternet() {
if (!navigator.onLine) {
  localStorage.setItem("lastPage", window.location.href);
  window.location.href = "offline.html";
}
  }

  // Run on load
  checkInternet();

  // Listen for connection loss
window.addEventListener("offline", () => {
  localStorage.setItem("lastPage", window.location.href);
  window.location.href = "offline.html";
});
</script>
</body>
</html>
