  <script type="module">
    import { auth } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "signin.html";
      }
    });
  </script>

  <!-- logout script -->
  <script type="module">
    import { auth } from "./firebase-config.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      showLoading("Logging you out...");
      await signOut(auth);
      window.location.href = "index.html";
    });
  </script>
  <script type="module">
    import { auth } from "./firebase-config.js";
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-database.js";

    const welcomeText = document.getElementById("welcomeText");

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        const db = getDatabase();
        const snapshot = await get(ref(db, "users/" + user.uid));

        if (snapshot.exists()) {
          const name = snapshot.val().name;
          welcomeText.textContent = `Hi, ${name}`;
        }
      }
    });
  </script>
  <script src="loadingHelper.js"></script>

  <!-- GLOBAL LOADING OVERLAY -->
  <div id="loadingOverlay" class="loading-overlay d-none">

      <p class="loading-text">Processing your request...</p>
    </div>
  </div>
  <script>
  function checkInternet() {
if (!navigator.onLine) {
  localStorage.setItem("lastPage", window.location.href);
  window.location.href = "offline.html";
}
  }

  // Run on load
  checkInternet();

  // Listen for connection loss
window.addEventListener("offline", () => {
  localStorage.setItem("lastPage", window.location.href);
  window.location.href = "offline.html";
});
</script>
